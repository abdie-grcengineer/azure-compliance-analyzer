<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRC Engineering</title>
  <meta name="description" content="GRC Engineering: compliance as code, evidence as a side-effect of the work." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      background: #002366;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 9vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }

    p.tagline {
      margin-top: 1.5rem;
      font-size: clamp(1rem, 2.2vw, 1.5rem);
      font-weight: 300;
      opacity: 0.9;
      max-width: 40rem;
    }

    .accent {
      display: block;
      width: 4rem;
      height: 3px;
      background: #ffffff;
      margin-top: 2.5rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <h1>GRC Engineering</h1>
  <p class="tagline">Compliance as code. Evidence as a side-effect of the work.</p>
  <span class="accent" aria-hidden="true"></span>
</body>
</html>
